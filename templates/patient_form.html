{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h2>Patient Information</h2>
    <form method="post" class="validated-form">
        <label>Name <input type="text" name="name" required></label>
        <label>Age <input type="number" name="age" min="0" required></label>
        <label>Gender
            <select name="gender" required>
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </label>
        <label>Diagnosis <input type="text" name="diagnosis"></label>
        <label>Billed Amount <input type="number" name="billed_amount" min="0" step="0.01" required></label>
        <label>Admission Date <input type="date" name="admission_date"></label>
        <label>Discharge Date <input type="date" name="discharge_date"></label>
        <label>Discharge Status
            <select name="is_discharged" required>
                <option value="no" selected>No (Currently Admitted)</option>
                <option value="yes">Yes (Discharged)</option>
            </select>
        </label>
        <label>Consulting Doctor
            <select name="doctor_id" required>
                <option value="">Select Doctor</option>
                {% for doctor in doctors %}
                    <option value="{{ doctor.doctor_id }}">{{ doctor.name }} ({{ doctor.specialization }})</option>
                {% endfor %}
            </select>
        </label>
        <button type="submit">Save Patient</button>
    </form>
</section>
{% endblock %}
