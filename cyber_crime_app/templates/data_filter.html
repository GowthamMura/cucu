{% extends 'base.html' %}
{% block content %}
<h2>Data Filter</h2>
<div class="card p-4 mb-3">
  <form method="POST" class="row g-3">
    <div class="col-md-2"><input type="number" class="form-control" name="year" placeholder="Year"></div>
    <div class="col-md-3"><input type="text" class="form-control" name="category" placeholder="Crime Category"></div>
    <div class="col-md-3"><input type="text" class="form-control" name="state_city" placeholder="State or City"></div>
    <div class="col-md-3"><input type="text" class="form-control" name="severity" placeholder="Severity Level"></div>
    <div class="col-md-1 d-grid"><button class="btn btn-secondary">Filter</button></div>
  </form>
</div>

{% if results %}
<div class="card p-3">
  <div class="table-responsive">
    <table class="table table-sm table-striped">
      <thead><tr><th>Case ID</th><th>Crime</th><th>Location</th><th>State</th><th>Year</th><th>Severity</th></tr></thead>
      <tbody>
        {% for r in results %}
          <tr><td>{{ r.Case_ID }}</td><td>{{ r.Crime_Type }}</td><td>{{ r.Location }}</td><td>{{ r.State }}</td><td>{{ r.Year }}</td><td>{{ r.Severity_Level }}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endif %}
{% endblock %}
